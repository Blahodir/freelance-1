name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fjordstep-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Deploy to Local Server via SSH Tunnel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Connected to LizardOS!"
            echo "Current directory: $(pwd)"
            # Тут в реальному житті ми робимо:
            # docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fjordstep-backend:latest
            # docker compose up -d
            echo "Deployment simulation finished successfully."
