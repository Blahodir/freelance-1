name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Деплоїмо тільки стабільний код
  pull_request:
    branches: [ "main" ] # Перевіряємо білд перед злиттям (Merge Request)

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Крок 1: Перевірка синтаксису (Linting) - щоб не збирати "кривий" код
      - name: Install Dependencies
        run: npm install

      - name: Lint Code
        run: npm run lint || echo "No lint script found, skipping..."

      # Крок 2: Логін у сховище
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' # Не логінимось, якщо це просто перевірка PR
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Крок 3: Збірка та Пуш з тегуванням
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # Пушимо тільки якщо це push у main
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fjordstep-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fjordstep-backend:${{ github.sha }}
